<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Dashboard 4</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="font-weight-bold text-secondary">Posts Dashboard</h2>
            <button type="button" class="btn btn-primary font-weight-bold px-4 py-2 shadow-sm" data-toggle="modal" data-target="#postModal" id="openModalBtn">
                Add New Post
            </button>
        </div>

        <div class="row" id="postContainer"></div>
    </div>

    <div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg p-4">
                <div class="modal-body">
                    <form id="postForm">
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-dark d-block mb-1">Title*</label>
                            <input type="text" id="title" class="form-control" placeholder="Enter title" required>
                        </div>
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-dark d-block mb-1">Body*</label>
                            <textarea id="body" class="form-control" rows="4" placeholder="Enter body" required></textarea>
                        </div>
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-dark d-block mb-1">User ID*</label>
                            <select id="userId" class="form-control" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5">
                            <button type="submit" id="addPostBtn" class="btn btn-success px-4 font-weight-bold py-2">Add Post</button>
                            <button type="button" id="updatePostBtn" class="btn btn-warning px-4 font-weight-bold py-2 d-none">Update Post</button>
                            <button type="button" class="btn btn-link text-secondary font-weight-bold text-decoration-none" data-dismiss="modal">Close</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="spinner" class="spinner-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
